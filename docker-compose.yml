version: '3.8'

services:
  db:
    image: postgres:15
    container_name: vitaai_db
    restart: always
    environment:
      POSTGRES_USER: vitaai_admin
      POSTGRES_PASSWORD: VitaAI_20262808
      POSTGRES_DB: vitaai_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: