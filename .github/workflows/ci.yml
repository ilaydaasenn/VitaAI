name: VitaAI Backend CI Pipeline

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Proje Kodlarını GitHub'dan Çek
        uses: actions/checkout@v4

      - name: Docker Compose ile Veritabanını Başlat
        run: |
          docker compose up -d db

      - name: Veritabanı Hazır mı Kontrol Et
        run: |
          echo "Veritabanının hazır olması bekleniyor..."
          until docker exec vitaai_db pg_isready -U vitaai_admin; do
            echo "Veritabanı henüz hazır değil, tekrar deneniyor..."
            sleep 2
          done
          echo "Veritabanı hazır!"

      - name: Python 3.10 Kurulumunu Yap
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Proje Kütüphanelerini Yükle
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Backend Testlerini Çalıştır
        env:
          PYTHONPATH: .
        run: |
          python -m pytest backend/tests/

      - name: Pipeline Başarı Testi
        run: |
          echo "CI Süreci başarıyla tamamlandı!"
